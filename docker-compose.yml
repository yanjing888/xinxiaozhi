services:
  mysql:
    image: mysql:8.4
    container_name: xinxiaozhi-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: xinxiaozhi
      TZ: Asia/Shanghai
    volumes:
      - xinxiaozhi_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  xinxiaozhi_mysql_data:
